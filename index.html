<!doctype html>
<meta charset='utf-8'>
<title>Super Stories</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<link rel='preconnect' href='https://fonts.googleapis.com'>
<link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
<link href='https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap' rel='stylesheet'>
<link rel='stylesheet' href='style.css'>

<canvas id='starCanvas'></canvas>

<header>
  <img src='Harrow-International-School-Bangkok-logo.jpg' alt='Harrow International School Bangkok' class='logo'>
  <h1>Super Stories</h1>
  <p class='tagline'>Stories made by NW, for NW</p>
</header>

<main>
  <div class='grid' id='videoGrid'>
    <div class='loading'>Loading stories...</div>
  </div>
</main>

<div class='modal-overlay' id='modalOverlay'>
  <div class='modal'>
    <button class='modal-close' id='modalClose' aria-label='Close'>&#x2715;</button>
    <h2 class='modal-title' id='modalTitle'></h2>
    <div class='modal-video'>
      <iframe id='videoPlayer' width='100%' height='100%' frameborder='0' allow='autoplay; fullscreen' allowfullscreen></iframe>
    </div>
  </div>
</div>

<script src='app.js'></script>
